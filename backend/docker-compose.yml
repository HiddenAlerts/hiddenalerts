services:
  db:
    image: postgres:16-alpine
    container_name: hiddenalerts_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hiddenalerts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hiddenalerts}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hiddenalerts}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: hiddenalerts_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
